<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klikka - Catch Every Moment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Manrope', sans-serif; 
            background-color: #fff1f2; /* Soft pink/rose background */
            background-image: 
                radial-gradient(at 0% 0%, #ffe4e6 0px, transparent 50%), 
                radial-gradient(at 100% 100%, #fbcfe8 0px, transparent 50%);
            color: #0f172a; /* Dark slate for readability */
            background-attachment: fixed;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9); 
            box-shadow: 0 10px 40px -10px rgba(255, 30, 86, 0.08);
        }
        .red-gradient { background: linear-gradient(135deg, #ff1e56 0%, #ff4b72 100%); }
        .active-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 30, 86, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 pb-20 overflow-x-hidden relative">

    <div class="absolute top-20 right-10 w-64 h-64 bg-rose-300/30 rounded-full blur-3xl -z-10"></div>
    <div class="absolute bottom-20 left-10 w-72 h-72 bg-pink-300/30 rounded-full blur-3xl -z-10"></div>

    <div class="max-w-4xl mx-auto relative z-10">
        <div class="flex justify-between items-center py-6">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 red-gradient rounded-lg rotate-12 flex items-center justify-center font-black text-white shadow-lg shadow-rose-500/30">K</div>
                <h1 class="text-xl font-extrabold tracking-tighter text-slate-900">KLIKKA<span class="text-rose-500">.</span></h1>
            </div>
            <button onclick="toggleAdmin()" class="text-[10px] text-slate-500 uppercase tracking-widest hover:text-rose-500 transition border border-slate-300 bg-white/50 px-4 py-2 rounded-full shadow-sm hover:shadow-md">🔐 Admin</button>
        </div>

        <div id="view-customer" class="space-y-6">
            <div id="booth-selection" class="grid grid-cols-2 gap-4">
                <button onclick="selectBooth('elevator')" class="glass p-8 rounded-[2rem] text-center hover:-translate-y-1 transition-all group">
                    <span class="text-5xl group-hover:scale-110 inline-block transition-transform drop-shadow-md">🛗</span>
                    <p class="mt-4 font-bold tracking-wide text-slate-800">Elevator</p>
                </button>
                <button onclick="selectBooth('mrt')" class="glass p-8 rounded-[2rem] text-center hover:-translate-y-1 transition-all group">
                    <span class="text-5xl group-hover:scale-110 inline-block transition-transform drop-shadow-md">🚇</span>
                    <p class="mt-4 font-bold tracking-wide text-slate-800">MRT</p>
                </button>
                <button onclick="selectBooth('elevator_vintage')" class="glass p-8 rounded-[2rem] text-center hover:-translate-y-1 transition-all group">
                    <span class="text-5xl group-hover:scale-110 inline-block transition-transform drop-shadow-md">🎬</span>
                    <p class="mt-4 font-bold tracking-wide text-slate-800">Elevator Vintage</p>
                </button>
                <button onclick="selectBooth('tirai_vintage')" class="glass p-8 rounded-[2rem] text-center hover:-translate-y-1 transition-all group">
                    <span class="text-5xl group-hover:scale-110 inline-block transition-transform drop-shadow-md">🎪</span>
                    <p class="mt-4 font-bold tracking-wide text-slate-800">Tirai Vintage</p>
                </button>
            </div>

            <div id="customer-dashboard" class="hidden space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div class="glass p-8 rounded-[3rem] text-center relative overflow-hidden border-2 border-white">
                    <p id="current-booth-name" class="inline-block bg-rose-100 text-[10px] font-black uppercase tracking-[0.3em] text-rose-600 px-4 py-1 rounded-full mb-6"></p>
                    
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Now Posing 📸</h2>
                    <div id="active-no" class="text-8xl md:text-9xl font-black tracking-tighter my-4 text-rose-500 drop-shadow-sm">---</div>
                    
                    <div class="grid grid-cols-2 gap-4 mt-8 bg-white/50 rounded-3xl p-6 shadow-inner">
                        <div class="text-left border-r border-slate-200">
                            <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Next Up</p>
                            <p id="next-no" class="text-3xl font-black text-slate-800">---</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Waiting</p>
                            <p id="queue-count" class="text-3xl font-black text-rose-500">0</p>
                        </div>
                    </div>
                </div>

                <button id="btn-ambil" onclick="takeQueue()" class="w-full red-gradient text-white font-black py-6 rounded-[2rem] text-xl shadow-[0_15px_30px_rgba(255,30,86,0.25)] active:scale-95 transition-all">TAKE A TICKET 🎟️</button>
                
                <div id="ticket-result" class="hidden glass p-10 rounded-[2rem] border-2 border-dashed border-rose-400 text-center bg-white/80">
                    <p class="text-xs text-slate-500 font-bold mb-2 uppercase tracking-widest">Have fun! Your number is:</p>
                    <p id="my-number" class="text-7xl font-black text-rose-600 active-pulse drop-shadow-md">---</p>
                    <p class="text-[10px] text-slate-400 mt-4 font-semibold">Screenshot this so you don't lose it!</p>
                </div>
                
                <button onclick="location.reload()" class="w-full text-slate-400 text-xs py-4 font-bold uppercase tracking-widest hover:text-rose-500 transition">← Choose Another Booth</button>
            </div>
        </div>

        <div id="view-admin" class="hidden space-y-6">
            <div id="admin-login" class="glass p-10 rounded-[2.5rem] max-w-sm mx-auto text-center border-2 border-white">
                <div class="mb-6 text-4xl drop-shadow-md">🔐</div>
                <h3 class="text-xl font-bold mb-6 text-slate-800">Staff Access Only</h3>
                <input id="admin-code" type="password" placeholder="Passcode" class="w-full p-4 rounded-2xl bg-white/80 border border-slate-200 mb-4 text-center text-slate-800 font-bold focus:border-rose-500 focus:ring-2 focus:ring-rose-200 outline-none transition shadow-inner">
                <button onclick="loginAdmin()" class="w-full red-gradient text-white py-4 rounded-2xl font-bold shadow-[0_10px_20px_rgba(255,30,86,0.2)] hover:shadow-[0_15px_25px_rgba(255,30,86,0.3)] transition-all">ACCESS DASHBOARD</button>
            </div>

            <div id="admin-panel" class="hidden space-y-6">
                <div class="flex justify-between items-center px-2">
                    <h2 class="text-2xl font-black tracking-tight text-slate-900">Admin<span class="text-rose-500">Ops</span></h2>
                    <div class="px-4 py-2 bg-emerald-100 border border-emerald-200 rounded-full shadow-sm">
                        <p class="text-emerald-600 text-[10px] font-bold uppercase tracking-widest">Total Done: <span id="admin-total-done" class="text-sm ml-1 font-black">0</span></p>
                    </div>
                </div>

                <div id="admin-booths" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

                <div class="glass p-6 rounded-[2rem] border border-white">
                    <h3 class="font-bold text-sm uppercase tracking-widest mb-4 flex justify-between items-center text-slate-800">
                        Recent Activity <span class="text-[10px] text-slate-400 italic font-normal">Scroll for more</span>
                    </h3>
                    <div id="admin-recap" class="text-xs space-y-2 max-h-60 overflow-y-auto pr-2">
                        </div>
                </div>
                
                <button onclick="logoutAdmin()" class="w-full bg-slate-200 text-slate-500 py-4 rounded-2xl font-bold hover:bg-rose-100 hover:text-rose-600 transition shadow-sm">LOGOUT SESSION</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxeIn_ay7dx9WzMwE-jMrOMqj1MyP-rH0xd9Nln9tkJRF0LL1WQPyNkUa1KZmgzh8H13Q/exec"; // GANTI INI!
        let currentBooth = "";

        window.onload = () => {
            if (localStorage.getItem('klikka_admin_logged_in') === 'true') { showAdminPanel(); }
            refreshData();
        };

        function toggleAdmin() {
            document.getElementById('view-customer').classList.toggle('hidden');
            document.getElementById('view-admin').classList.toggle('hidden');
        }

        function selectBooth(b) {
            currentBooth = b;
            document.getElementById('view-customer').querySelector('#booth-selection').classList.add('hidden');
            document.getElementById('customer-dashboard').classList.remove('hidden');
            document.getElementById('current-booth-name').innerText = b.replace('_', ' ');
            refreshData();
        }

        async function refreshData() {
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'get_status' })});
                const data = await res.json();
                
                if(currentBooth) {
                    const s = data.stats[currentBooth];
                    document.getElementById('active-no').innerText = s.active_number;
                    document.getElementById('next-no').innerText = s.next_number;
                    document.getElementById('queue-count').innerText = s.total_waiting;
                }

                if (document.getElementById('admin-total-done')) {
                    document.getElementById('admin-total-done').innerText = data.total_done;
                    updateAdminPanel(data.stats);
                    updateRecap(data.recap);
                }
            } catch (e) { console.error("Sync Error", e); }
        }

        function loginAdmin() {
            if(document.getElementById('admin-code').value === "1234") { 
                localStorage.setItem('klikka_admin_logged_in', 'true');
                showAdminPanel();
            } else { alert("Passcode Incorrect!"); }
        }

        function showAdminPanel() {
            document.getElementById('view-customer').classList.add('hidden');
            document.getElementById('view-admin').classList.remove('hidden');
            document.getElementById('admin-login').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            refreshData();
        }

        function logoutAdmin() { localStorage.removeItem('klikka_admin_logged_in'); location.reload(); }

        async function takeQueue() {
            const btn = document.getElementById('btn-ambil');
            btn.disabled = true; btn.innerText = "GENERATING TICKET...";
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'add_ticket', booth_type: currentBooth })});
                const result = await res.json();
                if(result.success) {
                    document.getElementById('my-number').innerText = result.number;
                    document.getElementById('ticket-result').classList.remove('hidden');
                    btn.classList.add('hidden');
                    refreshData();
                }
            } catch(e) { alert("Network Error"); btn.disabled = false; btn.innerText = "TAKE A TICKET 🎟️"; }
        }

        async function callNext(booth) {
            const targetBtn = event.target;
            targetBtn.disabled = true; targetBtn.innerText = "CALLING...";
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'call_next', booth_type: booth })});
            await refreshData();
        }

        function updateAdminPanel(stats) {
            const container = document.getElementById('admin-booths');
            if (!container) return;
            container.innerHTML = "";
            for (const [name, s] of Object.entries(stats)) {
                container.innerHTML += `
                    <div class="glass p-6 rounded-[2rem] border-t-4 ${s.total_waiting > 0 ? 'border-rose-400 bg-white/80' : 'border-slate-200 bg-white/50'} shadow-sm">
                        <h4 class="font-black uppercase text-rose-600 text-[10px] tracking-[0.2em] mb-4">${name.replace('_',' ')}</h4>
                        <div class="grid grid-cols-3 gap-2 text-center mb-6">
                            <div><p class="text-[8px] text-slate-400 uppercase font-bold">Active</p><p class="text-xl font-black text-slate-800">${s.active_number}</p></div>
                            <div><p class="text-[8px] text-slate-400 uppercase font-bold">Next</p><p class="text-xl font-black text-slate-800">${s.next_number}</p></div>
                            <div class="bg-emerald-50 rounded-xl py-1 border border-emerald-100"><p class="text-[8px] text-emerald-500 uppercase font-bold">Done</p><p class="text-xl font-black text-emerald-600">${s.total_done}</p></div>
                        </div>
                        <div class="flex justify-between items-center gap-2">
                             <div class="px-3 py-2 bg-slate-100 rounded-xl flex-1 text-center border border-slate-200">
                                <p class="text-[8px] text-slate-400 uppercase font-bold">Wait</p>
                                <p class="font-black text-rose-500">${s.total_waiting}</p>
                             </div>
                             <button onclick="callNext('${name}')" class="flex-[2] ${s.total_waiting > 0 ? 'red-gradient text-white shadow-md' : 'bg-slate-200 text-slate-400'} py-3 rounded-xl font-black text-xs transition-all hover:scale-[1.02] active:scale-95">CALL NEXT →</button>
                        </div>
                    </div>`;
            }
        }

        function updateRecap(recap) {
            const list = document.getElementById('admin-recap');
            if (!list) return;
            list.innerHTML = recap.map(r => `
                <div class="flex justify-between bg-white/70 p-3 rounded-xl border border-slate-100 shadow-sm items-center">
                    <span class="text-slate-700 font-semibold"><b class="text-rose-500 font-black">${r.number}</b> <span class="opacity-30 mx-1">|</span> <span class="text-[10px] uppercase tracking-wider">${r.booth_type.replace('_',' ')}</span></span>
                    <span class="text-slate-400 text-[10px] font-bold bg-slate-100 px-2 py-1 rounded-md">${new Date(r.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                </div>
            `).join('');
        }

        setInterval(refreshData, 5000); 
    </script>
</body>
</html>
