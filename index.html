<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klikka - Smart Queue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #fff1f2; background-image: radial-gradient(at 0% 0%, #ffe4e6 0px, transparent 50%), radial-gradient(at 100% 100%, #fbcfe8 0px, transparent 50%); color: #0f172a; background-attachment: fixed; transition: background-color 0.5s ease; }
        .glass { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.9); box-shadow: 0 10px 40px -10px rgba(255, 30, 86, 0.08); transition: all 0.5s ease; }
        .red-gradient { background: linear-gradient(135deg, #ff1e56 0%, #ff4b72 100%); }
        .active-pulse { animation: pulse 2s infinite; }
        
        /* Animasi saat giliran user tiba */
        .my-turn-bg { background-color: #ecfdf5 !important; background-image: none !important; }
        .my-turn-glass { border-color: #10b981 !important; box-shadow: 0 0 50px rgba(16, 185, 129, 0.4) !important; background: rgba(255,255,255,0.9) !important; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 30, 86, 0.2); border-radius: 10px; }
        input[type="month"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; transition: 0.2s; }
        input[type="month"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }
    </style>
</head>
<body id="main-body" class="min-h-screen p-4 pb-20 relative overflow-x-hidden">

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    <audio id="my-turn-sound" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" preload="auto"></audio>

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center py-6">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 red-gradient rounded-lg rotate-12 flex items-center justify-center font-black text-white shadow-lg shadow-rose-500/30">K</div>
                <h1 class="text-xl font-extrabold tracking-tighter text-slate-900">KLIKKA<span class="text-rose-500">.</span></h1>
            </div>
            <button onclick="toggleAdmin()" class="text-[10px] text-slate-500 uppercase tracking-widest border border-slate-300 bg-white/50 px-4 py-2 rounded-full hover:text-rose-500 transition">🔐 Admin</button>
        </div>

        <div id="view-customer">
            <div id="booth-selection" class="grid grid-cols-2 gap-4">
                <button onclick="selectBooth('elevator')" class="glass p-8 rounded-[2rem] text-center hover:-translate-y-1 transition-all group">
                    <span class="text-5xl drop-shadow-md group-hover:scale-110 inline-block transition-transform">🛗</span>
                    <p class="mt-4 font-bold text-slate-800">Elevator</p>
                </button>
                <button onclick="selectBooth('mrt')" class="glass p-8 rounded-[2rem] text-center hover:-translate-y-1 transition-all group">
                    <span class="text-5xl drop-shadow-md group-hover:scale-110 inline-block transition-transform">🚇</span>
                    <p class="mt-4 font-bold text-slate-800">MRT</p>
                </button>
                <button onclick="selectBooth('elevator_vintage')" class="glass p-8 rounded-[2rem] text-center hover:-translate-y-1 transition-all group">
                    <span class="text-5xl drop-shadow-md group-hover:scale-110 inline-block transition-transform">🎬</span>
                    <p class="mt-4 font-bold text-slate-800">Elevator Vintage</p>
                </button>
                <button onclick="selectBooth('tirai_vintage')" class="glass p-8 rounded-[2rem] text-center hover:-translate-y-1 transition-all group">
                    <span class="text-5xl drop-shadow-md group-hover:scale-110 inline-block transition-transform">🎪</span>
                    <p class="mt-4 font-bold text-slate-800">Tirai Vintage</p>
                </button>
            </div>

            <div id="customer-dashboard" class="hidden space-y-6">
                <div class="glass p-8 rounded-[3rem] text-center relative border-2 border-white">
                    <p id="current-booth-name" class="inline-block bg-rose-100 text-[10px] font-black uppercase tracking-[0.3em] text-rose-600 px-4 py-1 rounded-full mb-6"></p>
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Now Posing 📸</h2>
                    <div id="active-no" class="text-8xl font-black text-rose-500 my-4 drop-shadow-sm transition-transform duration-300">---</div>
                    <div class="grid grid-cols-2 gap-4 mt-8 bg-white/50 rounded-3xl p-6 shadow-inner">
                        <div class="text-left border-r border-slate-200">
                            <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Get Number</p>
                            <p id="next-no" class="text-3xl font-black text-slate-800">---</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Waiting</p>
                            <p id="queue-count" class="text-3xl font-black text-rose-500">0</p>
                        </div>
                    </div>
                </div>

                <button id="btn-ambil" onclick="takeQueue()" class="w-full red-gradient text-white font-black py-6 rounded-[2rem] text-xl shadow-lg active:scale-95 transition-all">TAKE A TICKET 🎟️</button>
                
                <div id="ticket-result" class="hidden glass p-10 rounded-[2rem] border-2 border-dashed border-rose-400 text-center bg-white/80 transition-all">
                    <p id="ticket-msg" class="text-xs text-slate-500 font-bold mb-2 uppercase tracking-widest">Have fun! Your number is:</p>
                    <p id="my-number" class="text-7xl font-black text-rose-600">---</p>
                    <p id="ticket-submsg" class="text-[10px] text-slate-400 mt-4 font-semibold">Screenshot tiket ini agar tidak hilang!</p>
                </div>
                
                <button onclick="clearMyTicket()" class="w-full text-slate-400 text-xs py-4 font-bold uppercase tracking-widest hover:text-rose-500 transition">← Change Booth / Reset Ticket</button>
            </div>
        </div>

        <div id="view-admin" class="hidden space-y-6">
            <div id="admin-login" class="glass p-10 rounded-[2.5rem] max-w-sm mx-auto text-center border-2 border-white">
                <h3 class="text-xl font-bold mb-6 text-slate-800">Staff Access</h3>
                <input id="admin-code" type="password" placeholder="Passcode" class="w-full p-4 rounded-2xl bg-white/80 border border-slate-200 mb-4 text-center focus:border-rose-500 outline-none transition">
                <button onclick="loginAdmin()" class="w-full red-gradient text-white py-4 rounded-2xl font-bold">LOGIN</button>
            </div>

            <div id="admin-panel" class="hidden space-y-6">
                <div class="flex justify-between items-center px-2">
                    <h2 class="text-2xl font-black tracking-tight text-slate-900">Admin<span class="text-rose-500">Ops</span></h2>
                    <div class="px-4 py-2 bg-emerald-100 border border-emerald-200 rounded-full">
                        <p class="text-emerald-600 text-[10px] font-bold uppercase tracking-widest">Total Selesai Keseluruhan: <span id="admin-total-done" class="text-sm font-black">0</span></p>
                    </div>
                </div>

                <div id="admin-booths" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

                <div class="glass p-6 rounded-[2rem] border border-white">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                        <h3 class="font-bold text-sm uppercase tracking-widest text-slate-800 flex items-center gap-2">
                            📊 Laporan Pengunjung Harian
                        </h3>
                        <div class="flex items-center gap-2 bg-white/80 px-3 py-2 rounded-xl border border-slate-200 shadow-sm">
                            <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Pilih Periode:</span>
                            <input type="month" id="monthFilter" class="bg-transparent font-bold text-sm text-rose-600 outline-none cursor-pointer" onchange="loadMonthlyStats()">
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto rounded-xl border border-slate-200 bg-white/40">
                        <table class="w-full text-left text-xs min-w-[500px]">
                            <thead class="bg-slate-100/50">
                                <tr class="text-[9px] text-slate-500 uppercase tracking-widest border-b border-slate-200">
                                    <th class="py-3 px-2 text-center font-bold">TGL</th>
                                    <th class="py-3 px-2 text-center font-bold">Elevator</th>
                                    <th class="py-3 px-2 text-center font-bold text-blue-500">MRT</th>
                                    <th class="py-3 px-2 text-center font-bold text-amber-500">Vintage</th>
                                    <th class="py-3 px-2 text-center font-bold text-purple-500">Tirai</th>
                                    <th class="py-3 px-2 text-center font-black text-rose-500">TOTAL</th>
                                </tr>
                            </thead>
                            <tbody id="admin-monthly-table"></tbody>
                        </table>
                    </div>
                </div>

                <div class="glass p-6 rounded-[2rem] border border-white">
                    <h3 class="font-bold text-sm uppercase tracking-widest mb-4 text-slate-800 border-b border-slate-200 pb-2">Log Real-time Terakhir</h3>
                    <div id="admin-recap" class="text-xs max-h-48 overflow-y-auto pr-2 flex flex-col gap-2"></div>
                </div>
                
                <button onclick="logoutAdmin()" class="w-full bg-slate-200 text-slate-500 py-4 rounded-2xl font-bold hover:bg-rose-100 hover:text-rose-600 transition">LOGOUT SESSION</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzs5Ba4gpSe2KsWUstrswkbsMErc1X1PDaylRg5H6-RNn5XMmB2Or5B_kljXdtb5E7ZGw/exec"; // PASTIKAN GANTI INI
        let currentBooth = "";
        let lastActiveTrack = {};

        window.onload = () => {
            const savedTicket = localStorage.getItem('klikka_my_ticket');
            const savedBooth = localStorage.getItem('klikka_my_booth');
            
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            document.getElementById('monthFilter').value = `${yyyy}-${mm}`;

            if (savedTicket && savedBooth) {
                currentBooth = savedBooth;
                document.getElementById('my-number').innerText = savedTicket;
                document.getElementById('ticket-result').classList.remove('hidden');
                document.getElementById('btn-ambil').classList.add('hidden');
                selectBooth(savedBooth);
            }

            if (localStorage.getItem('klikka_admin_logged_in') === 'true') { showAdminPanel(); }
            refreshData();
        };

        function selectBooth(b) {
            currentBooth = b;
            document.getElementById('view-customer').querySelector('#booth-selection').classList.add('hidden');
            document.getElementById('customer-dashboard').classList.remove('hidden');
            document.getElementById('current-booth-name').innerText = b.replace('_', ' ');
            refreshData();
        }

        function clearMyTicket() {
            localStorage.removeItem('klikka_my_ticket');
            localStorage.removeItem('klikka_my_booth');
            location.reload();
        }

        async function refreshData() {
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'get_status' })});
                const data = await res.json();
                
                if(currentBooth) {
                    const s = data.stats[currentBooth];
                    const activeEl = document.getElementById('active-no');
                    const myTicket = localStorage.getItem('klikka_my_ticket');

                    // CEK JIKA ADA NOMOR BARU YANG DIPANGGIL
                    if(lastActiveTrack[currentBooth] && lastActiveTrack[currentBooth] !== s.active_number && s.active_number !== "---") {
                        
                        // JIKA NOMOR YANG DIPANGGIL ADALAH MILIK PENGUNJUNG INI
                        if (myTicket && s.active_number === myTicket) {
                            document.getElementById('my-turn-sound').play().catch(()=>{});
                            
                            // Visual Alert: Layar jadi hijau cerah
                            document.getElementById('main-body').classList.add('my-turn-bg');
                            document.getElementById('ticket-result').classList.add('my-turn-glass');
                            document.getElementById('my-number').classList.add('active-pulse');
                            document.getElementById('my-number').style.color = '#10b981';
                            document.getElementById('ticket-msg').innerText = "IT'S YOUR TURN! SILAKAN MASUK";
                            document.getElementById('ticket-msg').style.color = '#10b981';
                            document.getElementById('ticket-submsg').innerText = "Have a great photo session!";
                            
                        } else {
                            // JIKA NOMOR ORANG LAIN
                            document.getElementById('notif-sound').play().catch(()=>{});
                            
                            // Visual biasa (hanya angka yg membesar)
                            activeEl.style.transform = "scale(1.2)";
                            activeEl.style.color = "#10b981"; 
                            setTimeout(() => {
                                activeEl.style.transform = "scale(1)";
                                activeEl.style.color = "#f43f5e"; 
                            }, 1000);
                        }
                    }
                    
                    lastActiveTrack[currentBooth] = s.active_number;
                    activeEl.innerText = s.active_number;
                    document.getElementById('next-no').innerText = s.next_number;
                    document.getElementById('queue-count').innerText = s.total_waiting;
                }

                if (document.getElementById('admin-total-done')) {
                    document.getElementById('admin-total-done').innerText = data.total_done;
                    updateAdminPanel(data.stats);
                    updateRecap(data.recap);
                }
            } catch (e) { console.error("Sync Error", e); }
        }

        async function takeQueue() {
            const btn = document.getElementById('btn-ambil');
            btn.disabled = true; btn.innerText = "GENERATING...";
            
            // Pancing audio agar browser memberi izin play
            document.getElementById('notif-sound').play().catch(()=>{}); 
            document.getElementById('my-turn-sound').play().catch(()=>{});

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'add_ticket', booth_type: currentBooth })});
                const result = await res.json();
                if(result.success) {
                    localStorage.setItem('klikka_my_ticket', result.number);
                    localStorage.setItem('klikka_my_booth', currentBooth);
                    document.getElementById('my-number').innerText = result.number;
                    document.getElementById('ticket-result').classList.remove('hidden');
                    btn.classList.add('hidden');
                    refreshData();
                }
            } catch(e) { alert("Network Error"); btn.disabled = false; btn.innerText = "TAKE A TICKET 🎟️"; }
        }

        function updateAdminPanel(stats) {
            const container = document.getElementById('admin-booths');
            if (!container) return;
            container.innerHTML = "";
            for (const [name, s] of Object.entries(stats)) {
                container.innerHTML += `
                    <div class="glass p-5 rounded-[2rem] border-t-4 ${s.total_waiting > 0 ? 'border-rose-400 bg-white/80' : 'border-slate-200 bg-white/50'} shadow-sm flex flex-col justify-between">
                        <h4 class="font-black uppercase text-rose-600 text-[10px] tracking-[0.2em] mb-4">${name.replace('_',' ')}</h4>
                        <div class="flex justify-between items-center mb-6 px-2">
                            <div class="text-center"><p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">Active</p><p class="text-2xl font-black text-slate-800">${s.active_number}</p></div>
                            <div class="text-center"><p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">Wait</p><p class="text-2xl font-black text-rose-500">${s.total_waiting}</p></div>
                        </div>
                        <button onclick="callNext('${name}')" class="w-full ${s.total_waiting > 0 ? 'red-gradient text-white shadow-md hover:-translate-y-1' : 'bg-slate-200 text-slate-400'} py-4 rounded-xl font-black text-xs transition-all">CALL NEXT →</button>
                    </div>`;
            }
        }

        async function callNext(booth) {
            const targetBtn = event.target;
            targetBtn.disabled = true; targetBtn.innerText = "CALLING...";
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'call_next', booth_type: booth })});
            await refreshData();
        }

        function updateRecap(recap) {
            const list = document.getElementById('admin-recap');
            if (!list) return;
            list.innerHTML = recap.map(r => `
                <div class="flex justify-between bg-white/70 p-3 rounded-xl border border-slate-100 items-center">
                    <span class="text-slate-700 font-semibold"><b class="text-rose-500 font-black">${r.number}</b> <span class="text-[10px] uppercase tracking-wider text-slate-400 ml-1">| ${r.booth_type.replace('_',' ')}</span></span>
                    <span class="text-slate-500 text-[10px] font-bold bg-slate-100 px-2 py-1 rounded-md">${new Date(r.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                </div>`).join('');
        }

        async function loadMonthlyStats() {
            const filterVal = document.getElementById('monthFilter').value;
            if(!filterVal) return;
            
            const [year, month] = filterVal.split('-');
            const tbody = document.getElementById('admin-monthly-table');
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-6 text-slate-400 font-bold animate-pulse">Menarik data dari database... ⏳</td></tr>';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'get_monthly_stats', month: parseInt(month), year: parseInt(year) })
                });
                const result = await res.json();
                if(result.success) { renderMonthlyTable(result.data, result.days); }
            } catch(e) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-6 text-rose-500 font-bold">Gagal memuat data. Periksa koneksi internet.</td></tr>';
            }
        }

        function renderMonthlyTable(data, days) {
            const tbody = document.getElementById('admin-monthly-table');
            let html = '';
            let tElv = 0, tMrt = 0, tVnt = 0, tTr = 0, tAll = 0;

            for(let i=1; i<=days; i++) {
                const d = data[i];
                if(d.total > 0) {
                    html += `
                    <tr class="border-b border-slate-200/50 hover:bg-white/70 transition">
                        <td class="py-2 px-2 text-center font-bold text-slate-700">${i}</td>
                        <td class="py-2 px-2 text-center text-slate-600 font-semibold">${d.elevator}</td>
                        <td class="py-2 px-2 text-center text-blue-500 font-semibold">${d.mrt}</td>
                        <td class="py-2 px-2 text-center text-amber-500 font-semibold">${d.elevator_vintage}</td>
                        <td class="py-2 px-2 text-center text-purple-500 font-semibold">${d.tirai_vintage}</td>
                        <td class="py-2 px-2 text-center font-black text-rose-600 bg-rose-50/50">${d.total}</td>
                    </tr>`;
                } else {
                     html += `
                    <tr class="border-b border-slate-100 opacity-40">
                        <td class="py-1 px-2 text-center font-bold text-slate-400">${i}</td>
                        <td class="py-1 px-2 text-center">-</td><td class="py-1 px-2 text-center">-</td>
                        <td class="py-1 px-2 text-center">-</td><td class="py-1 px-2 text-center">-</td>
                        <td class="py-1 px-2 text-center font-bold">-</td>
                    </tr>`;
                }
                tElv += d.elevator; tMrt += d.mrt; tVnt += d.elevator_vintage; tTr += d.tirai_vintage; tAll += d.total;
            }

            html += `
                <tr class="bg-rose-100 font-black text-rose-600 border-t-2 border-rose-200">
                    <td class="py-4 px-2 text-center">TOTAL</td>
                    <td class="py-4 px-2 text-center">${tElv}</td>
                    <td class="py-4 px-2 text-center">${tMrt}</td>
                    <td class="py-4 px-2 text-center">${tVnt}</td>
                    <td class="py-4 px-2 text-center">${tTr}</td>
                    <td class="py-4 px-2 text-center bg-rose-200">${tAll}</td>
                </tr>
            `;
            tbody.innerHTML = html;
        }

        function toggleAdmin() { document.getElementById('view-customer').classList.toggle('hidden'); document.getElementById('view-admin').classList.toggle('hidden'); }
        function loginAdmin() { if(document.getElementById('admin-code').value === "1234") { localStorage.setItem('klikka_admin_logged_in', 'true'); showAdminPanel(); } else { alert("Passcode Incorrect!"); } }
        function showAdminPanel() { document.getElementById('view-customer').classList.add('hidden'); document.getElementById('view-admin').classList.remove('hidden'); document.getElementById('admin-login').classList.add('hidden'); document.getElementById('admin-panel').classList.remove('hidden'); refreshData(); loadMonthlyStats(); }
        function logoutAdmin() { localStorage.removeItem('klikka_admin_logged_in'); location.reload(); }

        setInterval(refreshData, 5000); 
    </script>
</body>
</html>
