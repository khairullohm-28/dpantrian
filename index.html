<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klikka Photobooth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manrope', sans-serif; background: #09111f; color: white; }
        .glass { background: rgba(15, 26, 46, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen p-4">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black text-amber-400">KLIKKA</h1>
            <button onclick="toggleAdmin()" class="opacity-30 hover:opacity-100 transition">🔐 Admin</button>
        </div>

        <div id="view-customer">
            <div id="booth-selection" class="grid grid-cols-2 gap-4">
                <button onclick="selectBooth('elevator')" class="glass p-6 rounded-3xl text-center hover:border-amber-400 transition">
                    <span class="text-4xl">🛗</span><p class="mt-2 font-bold">Elevator</p>
                </button>
                <button onclick="selectBooth('mrt')" class="glass p-6 rounded-3xl text-center hover:border-blue-400 transition">
                    <span class="text-4xl">🚇</span><p class="mt-2 font-bold">MRT</p>
                </button>
                <button onclick="selectBooth('elevator_vintage')" class="glass p-6 rounded-3xl text-center hover:border-orange-400 transition">
                    <span class="text-4xl">🎬</span><p class="mt-2 font-bold">Vintage</p>
                </button>
                <button onclick="selectBooth('tirai_vintage')" class="glass p-6 rounded-3xl text-center hover:border-purple-400 transition">
                    <span class="text-4xl">🎪</span><p class="mt-2 font-bold">Tirai</p>
                </button>
            </div>

            <div id="customer-dashboard" class="hidden space-y-4 mt-4">
                <div class="glass p-8 rounded-[2.5rem] text-center border-t-4 border-amber-400">
                    <p id="current-booth-name" class="text-xs uppercase tracking-widest text-slate-400 mb-2"></p>
                    <h2 class="text-sm font-bold text-slate-500 uppercase">Nomor Aktif</h2>
                    <div id="active-no" class="text-8xl font-black text-amber-400 my-4">---</div>
                    <div class="grid grid-cols-2 gap-4 border-t border-white/10 pt-6">
                        <div><p class="text-[10px] text-slate-500 uppercase">Berikutnya</p><p id="next-no" class="text-2xl font-bold">---</p></div>
                        <div><p class="text-[10px] text-slate-500 uppercase">Sisa Antrian</p><p id="queue-count" class="text-2xl font-bold">0</p></div>
                    </div>
                </div>

                <button id="btn-ambil" onclick="takeQueue()" class="w-full bg-amber-400 text-slate-900 font-black py-5 rounded-2xl text-xl shadow-xl hover:bg-amber-300 transition">AMBIL ANTRIAN</button>
                
                <div id="ticket-result" class="hidden glass p-6 rounded-2xl border-2 border-dashed border-amber-400/50 text-center animate-bounce">
                    <p class="text-sm text-slate-400">ANTRIAN ANDA:</p>
                    <p id="my-number" class="text-6xl font-black text-white">---</p>
                </div>
                
                <button onclick="location.reload()" class="w-full text-slate-500 text-sm py-4 italic">← Ganti Booth</button>
            </div>
        </div>

        <div id="view-admin" class="hidden space-y-6">
            <div id="admin-login" class="glass p-8 rounded-3xl max-w-sm mx-auto text-center">
                <h3 class="text-xl font-bold mb-4">Akses Admin</h3>
                <input id="admin-code" type="password" placeholder="Kode Akses" class="w-full p-3 rounded-xl bg-white/10 border border-white/20 mb-4 text-center">
                <button onclick="loginAdmin()" class="w-full bg-blue-500 py-3 rounded-xl font-bold">MASUK</button>
            </div>

            <div id="admin-panel" class="hidden space-y-6">
                <div class="flex justify-between items-end">
                    <h2 class="text-2xl font-black">Panel Operator</h2>
                    <p class="text-emerald-400 font-bold">Total Selesai: <span id="admin-total-done">0</span></p>
                </div>

                <div id="admin-booths" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

                <div class="glass p-6 rounded-3xl">
                    <h3 class="font-bold mb-4 border-b border-white/10 pb-2">Rekap Pengunjung Selesai</h3>
                    <div id="admin-recap" class="text-sm space-y-2 max-h-48 overflow-y-auto"></div>
                </div>
                <button onclick="logoutAdmin()" class="w-full bg-red-500/20 text-red-400 py-3 rounded-xl font-bold">LOGOUT & RESET SESSION</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyHIMyiyA1OtY7o2RMA7BGjJnQqCkSw6mVVHK_TQc3jDLqB35BmLlxq9cvAYvFdzaDG6Q/exec";
        let currentBooth = "";

        // CEK STATUS LOGIN SAAT HALAMAN DIBUKA
        window.onload = () => {
            if (localStorage.getItem('klikka_admin_logged_in') === 'true') {
                showAdminPanel();
            }
            refreshData();
        };

        function selectBooth(b) {
            currentBooth = b;
            document.getElementById('view-customer').querySelector('#booth-selection').classList.add('hidden');
            document.getElementById('customer-dashboard').classList.remove('hidden');
            document.getElementById('current-booth-name').innerText = "BOOTH: " + b.replace('_', ' ');
            refreshData();
        }

        async function refreshData() {
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'get_status' })});
                const data = await res.json();
                
                if(currentBooth) {
                    const s = data.stats[currentBooth];
                    document.getElementById('active-no').innerText = s.active_number;
                    document.getElementById('next-no').innerText = s.next_number;
                    document.getElementById('queue-count').innerText = s.total_waiting;
                }

                if (document.getElementById('admin-total-done')) {
                    document.getElementById('admin-total-done').innerText = data.total_done;
                    updateAdminPanel(data.stats);
                    updateRecap(data.recap);
                }
            } catch (e) { console.error("Refresh gagal", e); }
        }

        function loginAdmin() {
            const inputCode = document.getElementById('admin-code').value;
            if(inputCode === "1234") { 
                localStorage.setItem('klikka_admin_logged_in', 'true');
                showAdminPanel();
            } else { alert("Kode Salah!"); }
        }

        function showAdminPanel() {
            document.getElementById('view-customer').classList.add('hidden');
            document.getElementById('view-admin').classList.remove('hidden');
            document.getElementById('admin-login').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            refreshData();
        }

        function logoutAdmin() {
            localStorage.removeItem('klikka_admin_logged_in');
            location.reload();
        }

        async function takeQueue() {
            const btn = document.getElementById('btn-ambil');
            btn.disabled = true; btn.innerText = "SEDANG MENGAMBIL...";
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'add_ticket', booth_type: currentBooth })});
                const result = await res.json();
                if(result.success) {
                    document.getElementById('my-number').innerText = result.number;
                    document.getElementById('ticket-result').classList.remove('hidden');
                    btn.classList.add('hidden');
                    refreshData();
                }
            } catch(e) { alert("Gagal ambil antrian"); btn.disabled = false; btn.innerText = "AMBIL ANTRIAN"; }
        }

        async function callNext(booth) {
            const targetBtn = event.target;
            targetBtn.disabled = true;
            targetBtn.innerText = "MEMANGGIL...";
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'call_next', booth_type: booth })});
            await refreshData();
        }

        function updateAdminPanel(stats) {
            const container = document.getElementById('admin-booths');
            if (!container) return;
            container.innerHTML = "";
            for (const [name, s] of Object.entries(stats)) {
                container.innerHTML += `
                    <div class="glass p-5 rounded-2xl border-l-4 ${s.total_waiting > 0 ? 'border-emerald-500' : 'border-white/10'}">
                        <h4 class="font-black uppercase text-amber-400 text-xs">${name.replace('_',' ')}</h4>
                        <div class="flex justify-between items-center my-3">
                            <div class="text-center"><p class="text-[10px] text-slate-500 uppercase">Aktif</p><p class="text-2xl font-bold">${s.active_number}</p></div>
                            <div class="text-center"><p class="text-[10px] text-slate-500 uppercase">Next</p><p class="text-2xl font-bold">${s.next_number}</p></div>
                            <div class="text-center"><p class="text-[10px] text-slate-500 uppercase text-blue-400">Antrian</p><p class="text-2xl font-bold">${s.total_waiting}</p></div>
                        </div>
                        <button onclick="callNext('${name}')" class="w-full ${s.total_waiting > 0 ? 'bg-emerald-500 text-white' : 'bg-white/10 text-slate-400'} py-2 rounded-lg font-bold transition">PELANGGAN BERIKUTNYA →</button>
                    </div>`;
            }
        }

        function updateRecap(recap) {
            const list = document.getElementById('admin-recap');
            if (!list) return;
            list.innerHTML = recap.map(r => `<div class="flex justify-between border-b border-white/5 pb-1"><span>${r.number} - ${r.booth_type.replace('_',' ')}</span><span class="text-slate-500">${new Date(r.created_at).toLocaleTimeString()}</span></div>`).join('');
        }

        function toggleAdmin() {
            document.getElementById('view-customer').classList.toggle('hidden');
            document.getElementById('view-admin').classList.toggle('hidden');
        }

        setInterval(refreshData, 5000); 
    </script>
</body>
</html>
